            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>

            <div></div>
            <button>2</button>
            <div></div>
            <button>3</button>
            <div></div>

            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <button>4</button>
            <div></div>
            <button>5</button>
            <div></div>
            <button>6</button>
            <div></div>
            <button class="rc">-</button>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>

            <button>8</button>
            <div></div>

            <div></div>

        <button>⌫</button>
    </div>

</html>
